# ============================================================
# FORION — LiteLLM Proxy Config
#
# Start the proxy:
#   poetry run litellm --config forion_config.yaml --port 4000
#
# Or with env vars loaded:
#   set -a && source .env && set +a
#   poetry run litellm --config forion_config.yaml --port 4000
# ============================================================

model_list:
  # --- OpenAI models ---
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # --- Anthropic models ---
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Google Gemini models ---
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

# ---- FORION product-aware routing (optional) ----
forion:
  enabled: true
  default_product: "ide"
  model_mapping:
    ide:
      default: "gpt-4o-mini"
      fallback: ["gpt-4o"]
    spark:
      default: "gpt-4o"
      fallback: ["claude-3-5-sonnet"]
    orbit:
      default: "gpt-4o-mini"
      fallback: ["gpt-4o-mini"]

# Register the FORION callback for metadata extraction + logging
litellm_settings:
  callbacks: ["litellm.proxy.forion.hooks.ForionCustomLogger"]

router_settings:
  routing_strategy: simple-shuffle

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
