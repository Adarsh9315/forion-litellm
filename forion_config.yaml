# ============================================================
# FORION — LiteLLM Proxy Config
#
# Start the proxy:
#   poetry run litellm --config forion_config.yaml --port 4000
#
# Or with env vars loaded:
#   set -a && source .env && set +a
#   poetry run litellm --config forion_config.yaml --port 4000
# ============================================================

model_list:
  # --- OpenAI models ---
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # --- Anthropic models ---
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Google Gemini models ---
  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-1.5-flash
    litellm_params:
      model: nvidia_nim/moonshotai/kimi-k2-instruct-0905
      api_key: os.environ/NVIDIA_API_KEY

  # --- NVIDIA NIM models (FREE tier — primary) ---
  - model_name: kimi-k2-instruct
    litellm_params:
      model: nvidia_nim/moonshotai/kimi-k2-instruct-0905
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: kimi-k2-thinking
    litellm_params:
      model: nvidia_nim/moonshotai/kimi-k2-thinking
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: qwen3-coder-480b
    litellm_params:
      model: nvidia_nim/qwen/qwen3-coder-480b-a35b-instruct
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: deepseek-v3.1
    litellm_params:
      model: nvidia_nim/deepseek-ai/deepseek-v3.1
      api_key: os.environ/NVIDIA_API_KEY

# ---- FORION product-aware routing ----
forion:
  enabled: true
  default_product: "ide"
  model_mapping:
    ide:
      default: "kimi-k2-instruct"
      fallback: ["qwen3-coder-480b", "deepseek-v3.1"]
    spark:
      default: "qwen3-coder-480b"
      fallback: ["kimi-k2-instruct", "deepseek-v3.1"]
    orbit:
      default: "kimi-k2-instruct"
      fallback: ["qwen3-coder-480b", "kimi-k2-thinking"]

# Register the FORION callback for metadata extraction + logging
litellm_settings:
  # ForionCustomLogger disabled — async_post_call_success_hook has a signature
  # mismatch with this LiteLLM version. Model routing still works via the
  # forion.model_mapping config above. Re-enable after upgrading litellm.
  # callbacks: ["litellm.proxy.forion.hooks.ForionCustomLogger"]
  callbacks: []

router_settings:
  routing_strategy: simple-shuffle

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
